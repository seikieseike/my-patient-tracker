<!DOCTYPE html>
<html lang="zh-Hant">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>Patient Tracker</title>
    <!-- Mobile App Settings -->
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="apple-mobile-web-app-title" content="Patient Tracker" />
    <meta name="theme-color" content="#2563eb" />
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <header class="topbar">
      <div class="topbar-inner">
        <div>
          <h1>Patient list</h1>
        </div>
        <div class="topbar-actions">
          <button class="ghost-btn icon-btn" id="toggleSearchBtn" type="button" title="搜尋">🔍</button>
          <button class="ghost-btn icon-btn" id="toggleAddAttendingBtn" type="button" title="新增 Attending">🧑‍⚕️</button>
          <button class="ghost-btn icon-btn" id="modeToggleBtn" type="button" title="切換模式">👁️</button>
          <button class="ghost-btn icon-btn" id="exportBtn" type="button" title="匯出 JSON">📤</button>
        </div>
      </div>
    </header>

    <main class="container">
      <section class="panel" id="addAttendingSection">
        <h2>新增 attending</h2>
        <form id="addPatientFormGlobal" class="grid-form" style="display:none;">
          <!-- Placeholder if needed, but the real one is per attending -->
        </form>
        <form id="addAttendingForm" class="grid-form">
          <label>
            <span>名稱</span>
            <input name="name" autocomplete="off" required placeholder="例如：Dr. Chen" />
          </label>
          <div class="form-actions">
            <button type="submit">Add</button>
          </div>
        </form>
        <p class="hint" style="display:none;"></p>
      </section>

      <section class="panel">
        <div class="panel-header">
          <h2>Seike's patients</h2>
          <div class="panel-tools" id="searchContainer" style="display:none;">
            <input
              id="searchInput"
              class="search"
              placeholder="搜尋：姓名 / 病歷號 / 床號 / attending / antibiotics"
              autocomplete="off"
            />
          </div>
        </div>

        <div id="attendingSections" class="attending-sections"></div>
        <div id="emptyState" class="empty-state" hidden>
          目前沒有任何 attending。請先在上方新增。
        </div>
      </section>
    </main>

    <dialog id="jsonDialog" class="json-dialog">
      <form method="dialog" class="json-dialog-inner">
        <div class="json-dialog-header">
          <h3>匯出 JSON</h3>
          <button class="ghost-btn" value="cancel" type="submit">關閉</button>
        </div>
        <textarea id="jsonOutput" readonly></textarea>
        <div class="json-dialog-footer">
          <button id="downloadJsonBtn" class="ghost-btn" type="button">下載檔案</button>
          <button id="copyJsonBtn" class="ghost-btn" type="button">複製文字</button>
          <button class="ghost-btn" value="cancel" type="submit">關閉</button>
        </div>
        <hr style="margin: 20px 0; border: none; border-top: 1px solid var(--border);" />
        <div class="json-dialog-header">
          <h3>貼上文字還原</h3>
        </div>
        <textarea id="jsonInputArea" placeholder="將之前複製的備份文字貼在這裡..."></textarea>
        <div class="json-dialog-footer">
          <button id="pasteImportBtn" class="primary-btn" type="button" style="background: var(--primary); color: white; border: none; padding: 10px; border-radius: 8px; cursor: pointer;">確認貼上並還原</button>
        </div>
      </form>
    </dialog>

    <script src="./app.js"></script>
  </body>
</html>
