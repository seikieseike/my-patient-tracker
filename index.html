<!DOCTYPE html>
<html lang="zh-Hant">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>簡單文字摘要工具</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main class="container">
      <h1>簡單文字摘要工具</h1>
      <p class="intro">把文字貼在下面，按「摘要」即可。</p>

      <label for="inputText">輸入文字</label>
      <textarea
        id="inputText"
        placeholder="請貼上你要摘要的內容..."
      ></textarea>

      <label for="summaryLength">摘要長度</label>
      <select id="summaryLength">
        <option value="short">短摘要（1句）</option>
        <option value="medium" selected>中摘要（3句）</option>
        <option value="long">長摘要（5句）</option>
      </select>

      <button id="summarizeButton">摘要</button>

      <section class="result-section">
        <h2>摘要結果</h2>
        <div id="result" class="result-box">摘要會顯示在這裡。</div>
      </section>

      <section class="history-section">
        <h2>歷史紀錄</h2>
        <div id="historyList" class="history-list">
          <p class="empty-history">目前還沒有紀錄。</p>
        </div>
      </section>
    </main>

    <script src="script.js"></script>
  </body>
</html>
